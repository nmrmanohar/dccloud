<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DC Cloud – Training Operations</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 28'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='36' y2='28' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%2381d4fa'/%3E%3Cstop offset='50%25' stop-color='%2329b6f6'/%3E%3Cstop offset='100%25' stop-color='%230288d1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M29.5 13.2c-.5-3.8-3.7-6.7-7.6-6.7-1.6 0-3.1.5-4.3 1.4C16.3 5.8 13.7 4 10.7 4 6.2 4 2.5 7.7 2.5 12.2c0 .2 0 .5.1.7C.9 13.6 0 15.4 0 17.4 0 20.7 2.7 23.4 6 23.4h22.5c3.3 0 6-2.7 6-6 0-2.7-1.8-5-4.9-6.2z' fill='url(%23g)'/%3E%3Ctext x='8.5' y='19.5' fill='white' font-size='10.5' font-weight='900' font-family='Arial'%3EDC%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css" />
  <!-- SheetJS for Excel import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- ── Login / Setup shell (shown when not authenticated) ── -->
  <div id="auth-shell" style="display:none">
    <div id="auth-content"></div>
  </div>

  <!-- ── Main app shell (shown when authenticated) ── -->
  <div id="app" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <!-- DC Cloud brand mark -->
          <svg width="30" height="24" viewBox="0 0 36 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="cg" x1="0" y1="0" x2="36" y2="28" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#81d4fa"/>
                <stop offset="50%" stop-color="#29b6f6"/>
                <stop offset="100%" stop-color="#0288d1"/>
              </linearGradient>
            </defs>
            <path d="M29.5 13.2c-.5-3.8-3.7-6.7-7.6-6.7-1.6 0-3.1.5-4.3 1.4C16.3 5.8 13.7 4 10.7 4 6.2 4 2.5 7.7 2.5 12.2c0 .2 0 .5.1.7C.9 13.6 0 15.4 0 17.4 0 20.7 2.7 23.4 6 23.4h22.5c3.3 0 6-2.7 6-6 0-2.7-1.8-5-4.9-6.2h-.1z" fill="url(#cg)"/>
            <text x="8.5" y="19.5" fill="white" font-size="10.5" font-weight="900" font-family="Arial,sans-serif" letter-spacing="0.5">DC</text>
          </svg>
          <span class="logo-text">DC Cloud</span>
        </div>
        <div class="logo-sub">Training Operations</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Training</div>
          <a class="nav-item" href="#/trainings" data-route="trainings">
            <span class="nav-icon">📋</span> Trainings List
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Related</div>
          <a class="nav-item" href="#/vendors" data-route="vendors">
            <span class="nav-icon">🏢</span> Accounts
          </a>
          <a class="nav-item" href="#/trainers" data-route="trainers">
            <span class="nav-icon">👤</span> Trainers
          </a>
        </div>
        <!-- Admin-only section, shown dynamically -->
        <div class="nav-section" id="nav-admin" style="display:none">
          <div class="nav-section-title">Admin</div>
          <a class="nav-item" href="#/users" data-route="users">
            <span class="nav-icon">👥</span> Users &amp; Roles
          </a>
        </div>
        <div class="nav-section nav-bottom">
          <a class="nav-item" href="#/settings" data-route="settings">
            <span class="nav-icon">⚙</span> Settings
          </a>
        </div>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <span class="page-title">Training Operations</span>
        </div>
        <div class="top-bar-right">
          <span class="user-pill" id="userPill"></span>
          <span class="env-badge">DC CLOUD</span>
        </div>
      </header>
      <main class="content" id="content">
        <div class="loading">Loading…</div>
      </main>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- GST Summary modal -->
  <div class="modal-overlay" id="gstOverlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal modal-lg">
      <div class="modal-title" id="gstTitle">GST Summary</div>
      <div id="gstBody" style="max-height:65vh;overflow-y:auto"></div>
      <div class="modal-footer">
        <button class="btn" onclick="exportGSTCSV()">⬇ Export CSV</button>
        <button class="btn btn-secondary" onclick="document.getElementById('gstOverlay').style.display='none'">Close</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Confirm</div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for Excel import -->
  <input type="file" id="importFile" accept=".xlsx,.csv" style="display:none" onchange="handleImportFile(this)" />

  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
