<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DC Cloud – Training Operations</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- SheetJS for Excel import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- ── Login / Setup shell (shown when not authenticated) ── -->
  <div id="auth-shell" style="display:none">
    <div id="auth-content"></div>
  </div>

  <!-- ── Main app shell (shown when authenticated) ── -->
  <div id="app" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">☁</span>
          <span class="logo-text">DC Cloud</span>
        </div>
        <div class="logo-sub">Training Operations</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Training</div>
          <a class="nav-item" href="#/trainings" data-route="trainings">
            <span class="nav-icon">📋</span> Trainings List
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Related</div>
          <a class="nav-item" href="#/vendors" data-route="vendors">
            <span class="nav-icon">🏢</span> Accounts
          </a>
          <a class="nav-item" href="#/trainers" data-route="trainers">
            <span class="nav-icon">👤</span> Trainers
          </a>
        </div>
        <!-- Admin-only section, shown dynamically -->
        <div class="nav-section" id="nav-admin" style="display:none">
          <div class="nav-section-title">Admin</div>
          <a class="nav-item" href="#/users" data-route="users">
            <span class="nav-icon">👥</span> Users &amp; Roles
          </a>
        </div>
        <div class="nav-section nav-bottom">
          <a class="nav-item" href="#/settings" data-route="settings">
            <span class="nav-icon">⚙</span> Settings
          </a>
        </div>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <span class="page-title">Training Operations</span>
        </div>
        <div class="top-bar-right">
          <span class="user-pill" id="userPill"></span>
          <span class="env-badge">DC CLOUD</span>
        </div>
      </header>
      <main class="content" id="content">
        <div class="loading">Loading…</div>
      </main>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- GST Summary modal -->
  <div class="modal-overlay" id="gstOverlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal modal-lg">
      <div class="modal-title" id="gstTitle">GST Summary</div>
      <div id="gstBody" style="max-height:65vh;overflow-y:auto"></div>
      <div class="modal-footer">
        <button class="btn" onclick="exportGSTCSV()">⬇ Export CSV</button>
        <button class="btn btn-secondary" onclick="document.getElementById('gstOverlay').style.display='none'">Close</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Confirm</div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for Excel import -->
  <input type="file" id="importFile" accept=".xlsx,.csv" style="display:none" onchange="handleImportFile(this)" />

  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
